name: Build JVMTI Agents

on:
  push:
    paths:
      - '**.c'
      - '**.h'
      - '**CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - '**.c'
      - '**.h'
      - '**CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/ci.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        project:
          - ch01_capability_checker
          - ch03_event_registration
          - ch04_thread_class_inspection
          - ch05_profiler_agent
          - ch06_gc_exception_agent
          - ch07_jni_callback_agent
          - ch08_thread_control_agent
          - ch09_heap_stack_agent
          - ch10_class_transform_agent
          - ch11_memory_cleanup_agent
          - ch12_prod_agent

    runs-on: ubuntu-latest
    name: ${{ matrix.project }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure CMake
        working-directory: ${{ matrix.project }}
        run: cmake -S . -B build

      - name: Build agent
        working-directory: ${{ matrix.project }}
        run: cmake --build build --config Release

      - name: Compile Java helpers (if any)
        working-directory: ${{ matrix.project }}
        shell: bash
        run: |
          shopt -s nullglob
          java_files=(*.java)
          if [ ${#java_files[@]} -gt 0 ]; then
            echo "Compiling ${java_files[*]}"
            javac "${java_files[@]}"
          else
            echo "No Java files to compile"
          fi

      - name: Smoke test — load agent into JVM
        working-directory: ${{ matrix.project }}
        shell: bash
        run: |
          AGENT_LIB=$(find build -name "*.so" -o -name "*.dylib" | head -1)
          if [ -n "$AGENT_LIB" ]; then
            echo "Loading agent: $AGENT_LIB"
            java -agentpath:"$(realpath "$AGENT_LIB")" -version 2>&1 || true
          else
            echo "No shared library found — skipping smoke test"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}-ubuntu
          path: ${{ matrix.project }}/build/
          retention-days: 7
